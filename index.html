<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>日文達人 App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    /* 自定義滾動條與動畫 */
    body { -webkit-tap-highlight-color: transparent; }
    .fade-in { animation: fadeIn 0.3s ease-in-out; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* 遮罩模式樣式 */
    .masked-text { transition: all 0.3s ease; }
    .is-hidden:not(.revealed) {
      filter: blur(6px);
      background-color: rgba(226, 232, 240, 0.5);
      color: transparent;
      user-select: none;
      cursor: pointer;
      border-radius: 4px;
      padding: 0 4px;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans pb-24 pt-16 select-none sm:select-auto">

  <!-- 頂部標題列 -->
  <header class="bg-blue-600 text-white p-4 shadow-md fixed top-0 w-full z-20 h-16 flex items-center justify-between">
    <div class="flex items-center w-1/4" id="header-left">
      <!-- 返回按鈕會動態生成於此 -->
    </div>
    <h1 id="header-title" class="font-bold text-lg text-center flex-1 tracking-wider truncate">日文達人</h1>
    <div class="w-1/4 flex justify-end"></div>
  </header>

  <!-- 主內容區 -->
  <main id="app-main" class="max-w-md mx-auto p-4"></main>

  <!-- 底部導覽列 -->
  <nav class="fixed bottom-0 w-full bg-white border-t border-slate-200 z-20" style="padding-bottom: env(safe-area-inset-bottom);">
    <div class="max-w-md mx-auto flex justify-around">
      <button onclick="window.app.setView('main_menu')" id="nav-home" class="flex flex-col items-center justify-center w-full py-3 text-blue-600 transition-colors">
        <i data-lucide="home" class="w-6 h-6 mb-1"></i>
        <span class="text-[10px] font-bold">探索學習</span>
      </button>
      
      <button onclick="window.app.setView('favorites')" id="nav-fav" class="flex flex-col items-center justify-center w-full py-3 relative text-slate-400 hover:text-slate-600 transition-colors">
        <div class="relative">
          <i data-lucide="star" id="nav-fav-icon" class="w-6 h-6 mb-1"></i>
          <span id="fav-badge" class="hidden absolute -top-1 -right-2 bg-rose-500 text-white text-[9px] font-black w-4 h-4 rounded-full flex items-center justify-center border-2 border-white"></span>
        </div>
        <span class="text-[10px] font-bold">單字庫</span>
      </button>
    </div>
  </nav>

  <script>
    // --- 1. 真實基礎資料庫 ---
    const baseWordDatabase = [
      { type: 'vocab', level: 'N5', kanji: '食べる', kana: 'たべる', meaning: '吃', examples: [{ jp: '私は毎日りんごを食べる。', zh: '我每天吃蘋果。' }, { jp: '朝ご飯を食べる時間がありません。', zh: '沒有吃早餐的時間。' }] },
      { type: 'vocab', level: 'N5', kanji: '行く', kana: 'いく', meaning: '去、前往', examples: [{ jp: '明日、東京へ行く。', zh: '明天要去東京。' }, { jp: '一緒に学校に行きましょう。', zh: '一起去學校吧。' }] },
      { type: 'vocab', level: 'N5', kanji: '水', kana: 'みず', meaning: '水', examples: [{ jp: '水を一杯ください。', zh: '請給我一杯水。' }, { jp: 'この水はとても冷たいです。', zh: '這水非常冰涼。' }] },
      { type: 'vocab', level: 'N4', kanji: '準備', kana: 'じゅんび', meaning: '準備', examples: [{ jp: '旅行の準備は終わりましたか。', zh: '旅行的準備結束了嗎？' }, { jp: '会議の準備をしています。', zh: '正在準備會議。' }] },
      { type: 'vocab', level: 'N3', kanji: '努力', kana: 'どりょく', meaning: '努力', examples: [{ jp: '彼は目標のために努力している。', zh: '他為了目標正在努力。' }] },
      { type: 'vocab', level: 'N2', kanji: '傾向', kana: 'けいこう', meaning: '傾向', examples: [{ jp: '最近の若者は車を買わない傾向にある。', zh: '最近的年輕人有不買車的傾向。' }] },
      { type: 'vocab', level: 'N1', kanji: '妥協', kana: 'だきょう', meaning: '妥協', examples: [{ jp: '品質に関しては絶対に妥協しない。', zh: '關於品質絕對不妥協。' }] }
    ];

    const baseTravelDatabase = [
      { type: 'vocab', level: '食物', kanji: 'ラーメン', kana: 'らーめん', meaning: '拉麵', examples: [{ jp: 'とんこつラーメンを一つください。', zh: '請給我一碗豚骨拉麵。' }, { jp: 'ここのラーメンは美味しいです。', zh: '這裡的拉麵很好吃。' }] },
      { type: 'vocab', level: '食物', kanji: '生ビール', kana: 'なまびーる', meaning: '生啤酒', examples: [{ jp: 'とりあえず生ビールをお願いします。', zh: '總之先來杯生啤酒吧。' }, { jp: '冷たいビールが飲みたい。', zh: '想喝冰涼的啤酒。' }] },
      { type: 'vocab', level: '食物', kanji: 'お会計', kana: 'おかいけい', meaning: '結帳', examples: [{ jp: 'お会計をお願いします。', zh: '麻煩結帳。' }, { jp: '別々でお会計できますか。', zh: '可以分開結帳嗎？' }] },
      { type: 'vocab', level: '設施', kanji: 'トイレ', kana: 'といれ', meaning: '廁所、洗手間', examples: [{ jp: 'トイレはどこですか。', zh: '請問廁所在哪裡？' }, { jp: 'この奥にトイレがあります。', zh: '廁所在這最裡面。' }] },
      { type: 'vocab', level: '設施', kanji: 'コンビニ', kana: 'こんびに', meaning: '便利商店', examples: [{ jp: '近くにコンビニはありますか。', zh: '附近有便利商店嗎？' }, { jp: 'コンビニでお弁当を買う。', zh: '在便利商店買便當。' }] },
      { type: 'vocab', level: '設施', kanji: '薬局', kana: 'やっきょく', meaning: '藥局', examples: [{ jp: '薬局で風邪薬を買いました。', zh: '在藥局買了感冒藥。' }, { jp: 'あそこに薬局が見えます。', zh: '可以看到那裡有家藥局。' }] },
      { type: 'vocab', level: '交通', kanji: '駅', kana: 'えき', meaning: '車站', examples: [{ jp: '東京駅までどうやって行きますか。', zh: '請問到東京車站怎麼走？' }, { jp: '駅の前で待ち合わせしましょう。', zh: '在車站前面碰面吧。' }] },
      { type: 'vocab', level: '交通', kanji: '新幹線', kana: 'しんかんせん', meaning: '新幹線', examples: [{ jp: '新幹線で京都へ行きます。', zh: '搭新幹線去京都。' }, { jp: '新幹線のチケットを予約する。', zh: '預約新幹線的車票。' }] },
      { type: 'vocab', level: '交通', kanji: '切符', kana: 'きっぷ', meaning: '車票', examples: [{ jp: '切符をなくしてしまいました。', zh: '我不小心把車票弄丟了。' }, { jp: '券売機で切符を買う。', zh: '在售票機買車票。' }] }
    ];

    const baseConversationDatabase = [
      { type: 'conversation', level: '日常對話', question: { speaker: '店員', kanji: '袋はお分けしますか？', kana: 'ふくろはおわけしますか？', meaning: '袋子需要幫您分開裝嗎？' }, answer: { speaker: '自己', kanji: '一緒で大丈夫です。', kana: 'いっしょでだいじょうぶです。', meaning: '裝一起就可以了。' } },
      { type: 'conversation', level: '日常對話', question: { speaker: '店員', kanji: 'ポイントカードはお持ちですか？', kana: 'ぽいんとかーどはおもちですか？', meaning: '請問有會員集點卡嗎？' }, answer: { speaker: '自己', kanji: '持っていません。', kana: 'もっていません。', meaning: '我沒有。' } },
      { type: 'conversation', level: '日常對話', question: { speaker: '自己', kanji: 'すみません、トイレはどこですか？', kana: 'すみません、といれはどこですか？', meaning: '不好意思，請問廁所在哪裡？' }, answer: { speaker: '店員', kanji: 'まっすぐ行って、右にあります。', kana: 'まっすぐいって、みぎにあります。', meaning: '直走之後，在您的右邊。' } },
      { type: 'conversation', level: '日常對話', question: { speaker: '店員', kanji: 'お支払いはどうされますか？', kana: 'おしはらいはどうされますか？', meaning: '請問您要用什麼方式付款？' }, answer: { speaker: '自己', kanji: 'クレジットカードでお願いします。', kana: 'くれじっとかーどでおねがいします。', meaning: '麻煩用信用卡付款。' } },
      { type: 'conversation', level: '日常對話', question: { speaker: '自己', kanji: 'これを試着してもいいですか？', kana: 'これをしちゃくしてもいいですか？', meaning: '請問這個可以試穿嗎？' }, answer: { speaker: '店員', kanji: 'はい、どうぞ。ご案内します。', kana: 'はい、どうぞ。ごあんないします。', meaning: '好的，請。我為您帶路。' } }
    ];

    // --- 2. 自動擴充邏輯 ---
    const generateFullDatabase = () => {
      const result = [];
      ['N5', 'N4', 'N3', 'N2', 'N1'].forEach(level => {
        const baseWords = baseWordDatabase.filter(w => w.level === level);
        for (let i = 0; i < 300; i++) {
          const base = baseWords[i % baseWords.length];
          const isMock = i >= baseWords.length;
          result.push({ ...base, id: `${level}-${i + 1}`, kanji: isMock ? `${base.kanji} ${i + 1}` : base.kanji, isMock });
        }
      });
      ['食物', '設施', '交通'].forEach(level => {
        const baseWords = baseTravelDatabase.filter(w => w.level === level);
        for (let i = 0; i < 100; i++) {
          const base = baseWords[i % baseWords.length];
          const isMock = i >= baseWords.length;
          result.push({ ...base, id: `travel-${level}-${i + 1}`, kanji: isMock ? `${base.kanji} ${i + 1}` : base.kanji, isMock });
        }
      });
      for (let i = 0; i < 100; i++) {
        const base = baseConversationDatabase[i % baseConversationDatabase.length];
        const isMock = i >= baseConversationDatabase.length;
        result.push({ ...base, id: `conv-${i + 1}`, question: { ...base.question, kanji: isMock ? `${base.question.kanji} (情境 ${i + 1})` : base.question.kanji }, isMock });
      }
      return result;
    };

    const fullWordDatabase = generateFullDatabase();

    // --- 3. 狀態與核心邏輯 ---
    window.appState = {
      currentView: 'main_menu',
      favorites: JSON.parse(localStorage.getItem('jlpt_favorites') || '[]'),
      learned: JSON.parse(localStorage.getItem('jlpt_learned') || '[]'),
      hideMeaning: false,
      visibleCount: 20
    };

    window.app = {
      saveState: () => {
        localStorage.setItem('jlpt_favorites', JSON.stringify(window.appState.favorites));
        localStorage.setItem('jlpt_learned', JSON.stringify(window.appState.learned));
      },
      setView: (view) => {
        window.appState.currentView = view;
        window.appState.visibleCount = 20;
        window.scrollTo(0, 0);
        window.app.render();
      },
      goBack: () => {
        const view = window.appState.currentView;
        if (['N5','N4','N3','N2','N1'].includes(view)) window.app.setView('jlpt_menu');
        else if (['食物','設施','交通','日常對話'].includes(view)) window.app.setView('travel_menu');
        else window.app.setView('main_menu');
      },
      toggleFavorite: (id) => {
        const idx = window.appState.favorites.indexOf(id);
        if (idx > -1) window.appState.favorites.splice(idx, 1);
        else window.appState.favorites.push(id);
        window.app.saveState();
        window.app.render(); // 觸發重繪
      },
      toggleLearned: (id) => {
        const idx = window.appState.learned.indexOf(id);
        if (idx > -1) window.appState.learned.splice(idx, 1);
        else window.appState.learned.push(id);
        window.app.saveState();
        window.app.render(); // 觸發重繪
      },
      toggleHideMeaning: () => {
        window.appState.hideMeaning = !window.appState.hideMeaning;
        window.app.render();
      },
      revealText: (el) => {
        if (window.appState.hideMeaning) el.classList.toggle('revealed');
      },
      loadMore: () => {
        window.appState.visibleCount += 20;
        window.app.render();
      },
      playAudio: (text) => {
        if ('speechSynthesis' in window) {
          window.speechSynthesis.cancel();
          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = 'ja-JP';
          utterance.rate = 0.85;
          window.speechSynthesis.speak(utterance);
        } else {
          alert('抱歉，不支援語音功能。');
        }
      },
      
      // --- 4. 渲染邏輯 ---
      render: () => {
        const state = window.appState;
        const mainEl = document.getElementById('app-main');
        const headerTitleEl = document.getElementById('header-title');
        const headerLeftEl = document.getElementById('header-left');
        const navHome = document.getElementById('nav-home');
        const navFav = document.getElementById('nav-fav');
        const favBadge = document.getElementById('fav-badge');
        const navFavIcon = document.getElementById('nav-fav-icon');

        // 更新標題與返回鍵
        const isMainMenu = state.currentView === 'main_menu';
        const isFavMenu = state.currentView === 'favorites';
        
        let title = state.currentView;
        if (isMainMenu) title = '日文達人';
        else if (state.currentView === 'jlpt_menu') title = '日文檢定 (JLPT)';
        else if (state.currentView === 'travel_menu') title = '旅遊日常';
        else if (isFavMenu) title = '我的單字庫';
        
        headerTitleEl.innerText = title;
        headerLeftEl.innerHTML = (!isMainMenu && !isFavMenu) 
          ? `<button onclick="window.app.goBack()" class="p-2 -ml-2 rounded-full hover:bg-blue-700 transition active:scale-95"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>`
          : '';

        // 更新底部導覽列樣式
        const isHomeActive = ['main_menu', 'jlpt_menu', 'travel_menu', 'N5', 'N4', 'N3', 'N2', 'N1', '食物', '設施', '交通', '日常對話'].includes(state.currentView);
        
        navHome.className = `flex flex-col items-center justify-center w-full py-3 transition-colors ${isHomeActive ? 'text-blue-600' : 'text-slate-400 hover:text-slate-600'}`;
        navFav.className = `flex flex-col items-center justify-center w-full py-3 relative transition-colors ${isFavMenu ? 'text-yellow-500' : 'text-slate-400 hover:text-slate-600'}`;
        navFavIcon.setAttribute('class', `w-6 h-6 mb-1 ${isFavMenu ? 'fill-current text-yellow-500' : ''}`);

        if (state.favorites.length > 0) {
          favBadge.innerText = state.favorites.length > 99 ? '99+' : state.favorites.length;
          favBadge.classList.remove('hidden');
        } else {
          favBadge.classList.add('hidden');
        }

        // 生成主內容 HTML
        let html = '';

        if (state.currentView === 'main_menu') {
          html = `
            <div class="space-y-6 fade-in">
              <div class="text-center mt-4 mb-8">
                <i data-lucide="book-open" class="w-12 h-12 mx-auto text-blue-500 mb-3"></i>
                <h2 class="text-2xl font-bold text-slate-800 mb-2">今天想學什麼？</h2>
                <p class="text-slate-500 text-sm">選擇你想提升的能力方向。</p>
              </div>
              <div class="grid gap-6">
                <button onclick="window.app.setView('jlpt_menu')" class="w-full bg-gradient-to-br from-blue-500 to-indigo-600 text-white p-6 rounded-2xl shadow-lg active:scale-[0.98] transition-transform text-left relative overflow-hidden">
                  <i data-lucide="book-open" class="w-20 h-20 absolute -right-6 -bottom-6 opacity-20 text-white"></i>
                  <h3 class="font-black text-2xl mb-2">日文檢定 (JLPT)</h3>
                  <p class="text-blue-100 mb-4 text-sm">包含 N5 到 N1 必考核心單字，準備考試必備。</p>
                  <div class="bg-white/20 inline-block px-4 py-2 rounded-full text-xs font-bold backdrop-blur-sm">開始測驗 →</div>
                </button>
                <button onclick="window.app.setView('travel_menu')" class="w-full bg-gradient-to-br from-emerald-500 to-teal-600 text-white p-6 rounded-2xl shadow-lg active:scale-[0.98] transition-transform text-left relative overflow-hidden">
                  <i data-lucide="plane" class="w-20 h-20 absolute -right-6 -bottom-6 opacity-20 text-white"></i>
                  <h3 class="font-black text-2xl mb-2">旅遊日常</h3>
                  <p class="text-emerald-100 mb-4 text-sm">收錄實用食物、設施單字，以及去日本玩必備的真實情境對話。</p>
                  <div class="bg-white/20 inline-block px-4 py-2 rounded-full text-xs font-bold backdrop-blur-sm">馬上出發 →</div>
                </button>
              </div>
            </div>`;
        } 
        else if (state.currentView === 'jlpt_menu') {
          html = `<div class="space-y-3 fade-in">`;
          ['N5', 'N4', 'N3', 'N2', 'N1'].forEach(level => {
            const learnedCount = state.learned.filter(id => id.startsWith(`${level}-`)).length;
            const progress = Math.round((learnedCount / 300) * 100);
            html += `
              <button onclick="window.app.setView('${level}')" class="w-full bg-white p-4 rounded-xl shadow-sm border border-slate-200 active:bg-slate-50 transition-all flex justify-between items-center group">
                <div class="flex items-center gap-4 w-full">
                  <div class="bg-blue-100 text-blue-700 font-black text-xl h-14 w-14 rounded-full flex items-center justify-center shrink-0">${level}</div>
                  <div class="text-left flex-1">
                    <h2 class="font-bold text-lg text-slate-800 mb-1">${level} 級單字</h2>
                    <div class="w-full bg-slate-100 rounded-full h-1.5 mb-1">
                      <div class="bg-blue-500 h-1.5 rounded-full" style="width: ${progress}%"></div>
                    </div>
                    <p class="text-xs text-slate-500">${learnedCount} / 300</p>
                  </div>
                </div>
                <i data-lucide="chevron-right" class="w-5 h-5 text-slate-300 ml-2"></i>
              </button>`;
          });
          html += `</div>`;
        }
        else if (state.currentView === 'travel_menu') {
          const cats = [
            { id: '食物', icon: 'utensils', color: 'text-orange-600', bg: 'bg-orange-100', count: 100, prefix: 'travel-食物-' },
            { id: '設施', icon: 'building', color: 'text-purple-600', bg: 'bg-purple-100', count: 100, prefix: 'travel-設施-' },
            { id: '交通', icon: 'train', color: 'text-sky-600', bg: 'bg-sky-100', count: 100, prefix: 'travel-交通-' },
            { id: '日常對話', icon: 'message-circle', color: 'text-rose-600', bg: 'bg-rose-100', count: 100, prefix: 'conv-' }
          ];
          html = `<div class="space-y-3 fade-in">`;
          cats.forEach(cat => {
            const learnedCount = state.learned.filter(id => id.startsWith(cat.prefix)).length;
            const progress = Math.round((learnedCount / cat.count) * 100);
            html += `
              <button onclick="window.app.setView('${cat.id}')" class="w-full bg-white p-4 rounded-xl shadow-sm border border-slate-200 active:bg-slate-50 transition-all flex justify-between items-center group">
                <div class="flex items-center gap-4 w-full">
                  <div class="${cat.bg} ${cat.color} h-14 w-14 rounded-full flex items-center justify-center shrink-0"><i data-lucide="${cat.icon}" class="w-6 h-6"></i></div>
                  <div class="text-left flex-1">
                    <h2 class="font-bold text-lg text-slate-800 mb-1">${cat.id}</h2>
                    <div class="w-full bg-slate-100 rounded-full h-1.5 mb-1">
                      <div class="bg-emerald-500 h-1.5 rounded-full" style="width: ${progress}%"></div>
                    </div>
                    <p class="text-xs text-slate-500">${learnedCount} / ${cat.count}</p>
                  </div>
                </div>
                <i data-lucide="chevron-right" class="w-5 h-5 text-slate-300 ml-2"></i>
              </button>`;
          });
          html += `</div>`;
        }
        else {
          // 列表視圖 (單字或對話)
          let displayWords = state.currentView === 'favorites' 
            ? fullWordDatabase.filter(w => state.favorites.includes(w.id))
            : fullWordDatabase.filter(w => w.level === state.currentView);
            
          const visibleWords = displayWords.slice(0, state.visibleCount);
          const hasMore = state.visibleCount < displayWords.length;
          
          const maskClass = state.hideMeaning ? 'is-hidden' : '';
          const eyeIcon = state.hideMeaning ? 'eye-off' : 'eye';
          const btnClass = state.hideMeaning ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-slate-600 border border-slate-200 shadow-sm';

          html = `
            <div class="fade-in">
              <div class="flex items-center justify-between mb-4 mt-2">
                <span class="bg-blue-100 text-blue-800 text-xs font-bold px-3 py-1.5 rounded-full">
                  共 ${displayWords.length} 筆
                </span>
                <button onclick="window.app.toggleHideMeaning()" class="flex items-center gap-1.5 px-4 py-2 rounded-full text-sm font-bold transition-all active:scale-95 ${btnClass}">
                  <i data-lucide="${eyeIcon}" class="w-4 h-4"></i>
                  <span>遮罩模式</span>
                </button>
              </div>`;

          if (displayWords.length === 0) {
            html += `
              <div class="bg-white p-8 rounded-2xl shadow-sm border border-slate-200 text-center mt-10">
                <i data-lucide="star" class="w-14 h-14 mx-auto text-slate-300 mb-4"></i>
                <h3 class="text-lg font-bold text-slate-700 mb-2">單字庫空空如也</h3>
                <p class="text-slate-500 text-sm leading-relaxed">在學習時點擊卡片右上角的「星星」，就可以將不會的內容收藏到這裡隨時複習喔！</p>
                <button onclick="window.app.setView('main_menu')" class="mt-6 bg-blue-50 text-blue-600 px-6 py-2 rounded-full font-bold text-sm">
                  去背單字
                </button>
              </div>`;
          } else {
            html += `<div class="space-y-4">`;
            visibleWords.forEach(word => {
              const isLearned = state.learned.includes(word.id);
              const isFav = state.favorites.includes(word.id);
              
              const learnedColor = isLearned ? 'text-emerald-500 scale-110' : 'text-slate-300';
              const learnedFill = isLearned ? 'fill-emerald-500 text-white' : '';
              
              const favColor = isFav ? 'text-yellow-400 scale-110' : 'text-slate-300';
              const favFill = isFav ? 'fill-yellow-400' : '';

              const actionButtons = `
                <div class="flex gap-2 -mr-2 -mt-2">
                  <button onclick="window.app.toggleLearned('${word.id}')" class="p-2 hover:bg-slate-100 rounded-full transition-colors active:scale-95">
                    <i data-lucide="check-circle" class="w-7 h-7 transition-all duration-300 ${learnedColor} ${learnedFill}"></i>
                  </button>
                  <button onclick="window.app.toggleFavorite('${word.id}')" class="p-2 hover:bg-slate-100 rounded-full transition-colors active:scale-95">
                    <i data-lucide="star" class="w-7 h-7 transition-all duration-300 ${favColor} ${favFill}"></i>
                  </button>
                </div>`;

              if (word.type === 'conversation') {
                const selfQClass = word.question.speaker === '自己' ? 'bg-blue-100 text-blue-700' : 'bg-rose-100 text-rose-700';
                const selfAClass = word.answer.speaker === '自己' ? 'bg-blue-100 text-blue-700' : 'bg-rose-100 text-rose-700';
                
                html += `
                  <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden relative border-t-4 border-t-rose-400">
                    <div class="p-4 flex justify-between items-start">
                      <div class="w-full pr-8">
                        <div class="mb-4">
                          <div class="flex items-center gap-2 mb-1.5">
                            <span class="text-[10px] font-bold px-2 py-0.5 rounded ${selfQClass}">${word.question.speaker}</span>
                            <span class="text-slate-400 text-xs">${word.question.kana}</span>
                          </div>
                          <div class="flex items-start gap-2 mb-1">
                            <div class="text-[17px] font-bold text-slate-800 leading-snug">${word.question.kanji}</div>
                            <button onclick="window.app.playAudio('${word.question.kanji.replace(/'/g, "\\'")}')" class="p-1 text-blue-500 bg-blue-50 active:bg-blue-100 rounded-full shrink-0"><i data-lucide="volume-2" class="w-4 h-4"></i></button>
                          </div>
                          <div class="text-[14px] text-slate-500"><span onclick="window.app.revealText(this)" class="masked-text ${maskClass}">${word.question.meaning}</span></div>
                        </div>
                        <div class="w-full h-px bg-slate-100 my-3"></div>
                        <div>
                          <div class="flex items-center gap-2 mb-1.5">
                            <span class="text-[10px] font-bold px-2 py-0.5 rounded ${selfAClass}">${word.answer.speaker}</span>
                            <span class="text-slate-400 text-xs">${word.answer.kana}</span>
                          </div>
                          <div class="flex items-start gap-2 mb-1">
                            <div class="text-[17px] font-bold text-slate-800 leading-snug">${word.answer.kanji}</div>
                            <button onclick="window.app.playAudio('${word.answer.kanji.replace(/'/g, "\\'")}')" class="p-1 text-blue-500 bg-blue-50 active:bg-blue-100 rounded-full shrink-0"><i data-lucide="volume-2" class="w-4 h-4"></i></button>
                          </div>
                          <div class="text-[14px] text-slate-500"><span onclick="window.app.revealText(this)" class="masked-text ${maskClass}">${word.answer.meaning}</span></div>
                        </div>
                      </div>
                      <div class="absolute top-3 right-3">${actionButtons}</div>
                    </div>
                  </div>`;
              } else {
                const bgClass = word.isMock ? 'bg-slate-50' : 'bg-gradient-to-br from-white to-blue-50/50';
                let examplesHtml = '';
                word.examples.forEach(ex => {
                  examplesHtml += `
                    <div class="relative pl-3 border-l-2 border-blue-200">
                      <div class="flex items-start justify-between gap-1 mb-1">
                        <p class="font-medium text-slate-700 text-[14px] leading-snug">${ex.jp}</p>
                        <button onclick="window.app.playAudio('${ex.jp.replace(/'/g, "\\'")}')" class="p-1 text-slate-400 active:text-blue-500 active:bg-blue-50 rounded shrink-0"><i data-lucide="volume-2" class="w-4 h-4"></i></button>
                      </div>
                      <p class="text-[13px] text-slate-500"><span onclick="window.app.revealText(this)" class="masked-text ${maskClass}">${ex.zh}</span></p>
                    </div>`;
                });

                html += `
                  <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden relative">
                    <div class="p-4 pb-3 border-b border-slate-100 flex justify-between items-start ${bgClass}">
                      <div>
                        <div class="text-blue-500 font-medium text-xs mb-1">${word.kana}</div>
                        <div class="flex items-center gap-2 mb-2">
                          <div class="text-3xl font-black text-slate-800">${word.kanji}</div>
                          <button onclick="window.app.playAudio('${word.kanji.replace(/'/g, "\\'")}')" class="p-2 text-blue-500 active:bg-blue-100 rounded-full transition-colors"><i data-lucide="volume-2" class="w-5 h-5"></i></button>
                        </div>
                        <div class="text-base font-bold text-emerald-600">
                          <span onclick="window.app.revealText(this)" class="masked-text ${maskClass}">${word.meaning}</span>
                        </div>
                      </div>
                      <div class="absolute top-3 right-3">${actionButtons}</div>
                    </div>
                    <div class="p-4 bg-slate-50/50">
                      <div class="space-y-3">${examplesHtml}</div>
                    </div>
                  </div>`;
              }
            });

            if (hasMore) {
              html += `
                <button onclick="window.app.loadMore()" class="w-full py-3 mt-4 bg-blue-50 text-blue-600 font-bold rounded-xl active:bg-blue-100 transition-colors flex items-center justify-center gap-2">
                  <span>載入更多 (${state.visibleCount} / ${displayWords.length})</span>
                  <i data-lucide="chevron-down" class="w-5 h-5"></i>
                </button>`;
            } else {
              html += `<div class="text-center py-6 text-slate-400 text-sm">已經到底囉！🎉</div>`;
            }
            html += `</div>`;
          }
          html += `</div>`;
        }

        mainEl.innerHTML = html;
        
        // 重新繪製 Lucide 圖標
        lucide.createIcons();
      }
    };

    // --- 5. 初始化 App ---
    document.addEventListener("DOMContentLoaded", () => {
      window.app.render();
    });

  </script>
</body>
</html>
